name: Build Windows installer

# Builds the Inno Setup .exe on PRs touching packages/local-win/ (compile
# check), on manual dispatch, and on a v* tag push. Every run uploads
# SeasonSprintTracker.exe as a workflow artifact; tag pushes additionally
# publish a GitHub Release with the installer attached.
#
# Note the trigger shape: an `on.push` with `tags:` and no `branches:` never
# fires for branch pushes (the old `paths:` filter here was dead), and adding
# `paths:` alongside `tags:` would filter tag pushes by changed files — a tag
# on an already-pushed commit has none, silently skipping release builds. So
# PR-time checks use `pull_request` and tag pushes stay unfiltered.

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "packages/local-win/**"
      - ".github/workflows/build-windows-installer.yml"
  workflow_dispatch:

permissions:
  contents: write  # needed to create GitHub Releases on tag push

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Inno Setup is present (preinstalled on windows-latest)
        shell: cmd
        run: |
          if not exist "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" (
            echo ERROR: ISCC.exe not found. Trying choco fallback...
            choco install innosetup --no-progress -y || exit /b 1
          )
          echo Inno Setup ISCC present.

      - name: Build installer
        shell: cmd
        working-directory: packages/local-win/installer
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Zip installer
        # Browser download scanners (Chrome SafeBrowsing, Defender ML heuristics)
        # aggressively flag unsigned .exe files. They generally don't unpack
        # zips, so we ship a .zip alongside the .exe as an unblockable fallback.
        shell: pwsh
        working-directory: packages/local-win/dist
        run: |
          Compress-Archive -Path SeasonSprintTracker.exe -DestinationPath SeasonSprintTracker.zip -CompressionLevel Optimal -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SeasonSprintTracker
          path: |
            packages/local-win/dist/SeasonSprintTracker.exe
            packages/local-win/dist/SeasonSprintTracker.zip
          if-no-files-found: error

      - name: Publish GitHub Release (on v* tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/local-win/dist/SeasonSprintTracker.exe
            packages/local-win/dist/SeasonSprintTracker.zip
          draft: false
          generate_release_notes: true
